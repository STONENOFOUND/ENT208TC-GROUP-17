<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="index.title">ElderCare SafeNight</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="index" class="splash-page">
  <main class="splash-shell">
    <section class="splash-card">
      <div class="splash-logo-wrap">
        <img
          src="assets/splash-logo.png"
          alt="ElderCare SafeNight Logo"
          class="splash-logo-image"
        />
      </div>

      <p class="eyebrow center" data-i18n="common.brand">ElderCare SafeNight</p>
      <h1 data-i18n="index.heading">Launching the monitoring app</h1>
      <p class="splash-text" data-i18n="index.description">
        Preparing dashboard, activity log, and settings for elderly night-time monitoring.
      </p>

      <div class="loader"><span></span></div>
      <p class="splash-hint" data-i18n="index.redirecting">Redirecting to dashboard...</p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
