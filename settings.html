<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>ENT208</h2>
      <nav>
        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="activity.html">Activity Log</a></li>
          <li><a href="settings.html" class="active">Settings</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1>System Settings</h1>
        <p>Configure night light, motion detection, and environmental thresholds</p>
      </header>

      <section class="panel">
        <h2>Night Light Settings</h2>
        <div class="setting-item">
          <label for="lightToggle">Night Light</label>
          <input type="checkbox" id="lightToggle" checked>
        </div>

        <div class="setting-item">
          <label for="sensitivityRange">Motion Sensitivity</label>
          <input type="range" id="sensitivityRange" min="1" max="10" value="7" oninput="updateSensitivityValue(this.value)">
          <span id="sensitivityValue">7</span>
        </div>

        <div class="setting-item">
          <label for="delaySelect">Light-off Delay</label>
          <select id="delaySelect">
            <option>2 minutes</option>
            <option selected>3 minutes</option>
            <option>4 minutes</option>
            <option>5 minutes</option>
          </select>
        </div>
      </section>

      <section class="panel">
        <h2>Temperature & Humidity Thresholds</h2>
        <div class="setting-grid">
          <div class="setting-item">
            <label for="tempLow">Min Temperature (°C)</label>
            <input type="number" id="tempLow" value="18">
          </div>
          <div class="setting-item">
            <label for="tempHigh">Max Temperature (°C)</label>
            <input type="number" id="tempHigh" value="28">
          </div>
          <div class="setting-item">
            <label for="humidityLow">Min Humidity (%)</label>
            <input type="number" id="humidityLow" value="40">
          </div>
          <div class="setting-item">
            <label for="humidityHigh">Max Humidity (%)</label>
            <input type="number" id="humidityHigh" value="70">
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Indicator Mode</h2>
        <div class="setting-item">
          <label for="indicatorMode">Light Indication Mode</label>
          <select id="indicatorMode">
            <option selected>Normal Mode</option>
            <option>Sleep-friendly Mode</option>
            <option>Alert Priority Mode</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="abnormalReminder">Abnormal Status Reminder</label>
          <input type="checkbox" id="abnormalReminder" checked>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Save Configuration</h2>
          <button class="btn" onclick="saveSettings()">Save Settings</button>
        </div>
        <p id="saveMessage" class="save-message"></p>
      </section>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
